<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {

    background: #f5f5f5;
    min-height: 100vh;
    display: flex;

    padding: 40px 20px;

    padding: 24px;
    max-width: 940px;
    width: 100%;
  }
  .chart-container svg { width: 100%; height: auto; display: block; }
  .legend {
    display: flex;
    gap: 24px;
    margin-top: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #555;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
  }
  .legend-square {
    width: 10px;
    height: 10px;
    display: inline-block;
    transform: rotate(45deg);
