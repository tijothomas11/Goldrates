<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Kerala Gold Rate History</title>

  <style>
    :root {
      --gold: #d4a017;
      --border: #e5e5e5;
      --background: #f5f5f5;
      --text: #333;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: var(--background);
      color: var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Arial,
        sans-serif;
    }

    main {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .toolbar a {
      display: inline-flex;
      min-height: 36px;
      padding: 8px 14px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: #444;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
    }

    .toolbar a:hover {
      border-color: var(--gold);
      background: #fff9e7;
    }

    .chart-card {
      padding: 16px;
      overflow: hidden;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 3px 18px rgba(0, 0, 0, 0.07);
    }

    .chart-card object {
      display: block;
      width: 100%;
      min-height: 600px;
      border: 0;
    }

    @media (max-width: 720px) {
      body {
        padding: 12px;
      }

      .chart-card {
        padding: 6px;
      }

      .chart-card object {
        min-height: 420px;
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="toolbar">
      <a href="index.html">
        Back to interactive chart
      </a>

      <a href="gold_rates.svg" download>
        Download SVG
      </a>
    </div>

    <div class="chart-card">
      <object
        data="gold_rates.svg?v=5"
        type="image/svg+xml"
        aria-label="Static Kerala gold-rate history chart"
      >
        gold_rates.svg
          Open the static SVG chart
        </a>
      </object>
    </div>
  </main>
</body>
</html>
