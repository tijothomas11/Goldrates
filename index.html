<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Kerala Gold Rate Tracker</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --gold: #d4a017;
      --gold-dark: #a87900;
      --orange: #e65100;
      --green: #2e7d32;
      --red: #c62828;
      --text: #333;
      --muted: #777;
      --border: #e5e5e5;
      --background: #f5f5f5;
      --card: #fff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 32px 18px;
      min-height: 100vh;
      background: var(--background);
      color: var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Arial,
        sans-serif;
    }

    main {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 24px;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 34px);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      padding: 22px;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 3px 18px rgba(0, 0, 0, 0.07);
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .range-buttons,
    .download-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button,
    .download-link {
      min-height: 36px;
      padding: 8px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: #444;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition:
        background 0.15s ease,
        color 0.15s ease,
        border-color 0.15s ease;
    }

    button:hover,
    .download-link:hover {
      border-color: var(--gold);
      background: #fff9e7;
    }

    button.active {
      border-color: var(--gold);
      background: var(--gold);
      color: #fff;
      font-weight: 600;
    }

    .chart-wrapper {
      position: relative;
      width: 100%;
      height: 530px;
    }

    #gold-chart {
      width: 100% !important;
      height: 100% !important;
    }

    .loading,
    .error {
      display: none;
      min-height: 300px;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
    }

    .loading.visible,
    .error.visible {
      display: flex;
    }

    .error {
      color: var(--red);
    }

    .summary {
      display: grid;
      grid-template-columns:
        repeat(4, minmax(120px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .summary-item {
      padding: 14px;
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-align: center;
    }

    .summary-label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .summary-value {
      display: block;
      font-size: 18px;
      font-weight: 700;
    }

    .current-value {
      color: var(--orange);
    }

    .minimum-value {
      color: var(--green);
    }

    .maximum-value {
      color: var(--red);
    }

    .average-value {
      color: #555;
    }

    .range-summary {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .static-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    details summary {
      color: #555;
      cursor: pointer;
      font-weight: 600;
    }

    .static-chart {
      display: block;
      width: 100%;
      height: auto;
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    footer {
      margin-top: 20px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 720px) {
      body {
        padding: 20px 10px;
      }

      .card {
        padding: 14px;
      }

      .chart-wrapper {
        height: 410px;
      }

      .summary {
        grid-template-columns: repeat(2, 1fr);
      }

      .toolbar {
        align-items: stretch;
      }

      .range-buttons,
      .download-links {
        width: 100%;
      }
    }

    @media (max-width: 420px) {
      .summary {
        grid-template-columns: 1fr;
      }

      .chart-wrapper {
        height: 360px;
      }
    }
  </style>
</head>

<body>
  <main>
    <header>
      <h1>Kerala Gold Rate Tracker</h1>

      <p class="subtitle">
        Historical 22K gold rate per gram
      </p>
    </header>

    <section class="card">
      <div class="toolbar">
        <div
          class="range-buttons"
          aria-label="Chart date range"
        >
          <button type="button" data-range="1m">
            1M
          </button>

          <button type="button" data-range="6m">
            6M
          </button>

          <button type="button" data-range="1y">
            1Y
          </button>

          <button type="button" data-range="5y">
            5Y
          </button>

          <button
            type="button"
            data-range="all"
            class="active"
          >
            All
          </button>
        </div>

        <div class="download-links">
          <a href="gold_rates.csv" download>
            CSV
          </a>

          <a href="gold_rates.xlsx" download>
            Excel
          </a>

          <a href="gold_rates.svg" download>
            Static SVG
          </a>
        </div>
      </div>

      <div
        id="loading"
        class="loading visible"
        role="status"
      >
        Loading historical gold rates…
      </div>

      <div
        id="error"
        class="error"
        role="alert"
      ></div>

      <div
        id="chart-wrapper"
        class="chart-wrapper"
        hidden
      >
        <canvas id="gold-chart"></canvas>
      </div>

      <div id="summary" class="summary" hidden>
        <div class="summary-item">
          <span class="summary-label">
            Current
          </span>

          <span
            id="current-price"
            class="summary-value current-value"
          >
            —
          </span>
        </div>

        <div class="summary-item">
          <span class="summary-label">
            Minimum
          </span>

          <span
            id="minimum-price"
            class="summary-value minimum-value"
          >
            —
          </span>
        </div>

        <div class="summary-item">
          <span class="summary-label">
            Maximum
          </span>

          <span
            id="maximum-price"
            class="summary-value maximum-value"
          >
            —
          </span>
        </div>

        <div class="summary-item">
          <span class="summary-label">
            Average
          </span>

          <span
            id="average-price"
            class="summary-value average-value"
          >
            —
          </span>
        </div>
      </div>

      <p id="range-summary" class="range-summary"></p>

      <div class="static-section">
        <details>
          <summary>
            View static SVG chart
          </summary>

          gold_rates.svg
        </details>
      </div>
    </section>

    <footer>
      Independent informational project.
    </footer>
  </main>

  <script>
    "use strict";

    const CSV_PATH = "gold_rates.csv";

    const loadingElement =
      document.getElementById("loading");

    const errorElement =
      document.getElementById("error");

    const chartWrapper =
      document.getElementById("chart-wrapper");

    const summaryElement =
      document.getElementById("summary");

    const rangeSummaryElement =
      document.getElementById("range-summary");

    const rangeButtons =
      document.querySelectorAll("[data-range]");

    let allRecords = [];
    let chart = null;

    const currencyFormatter =
      new Intl.NumberFormat("en-IN", {
        style: "currency",
        currency: "INR",
        maximumFractionDigits: 0,
      });

    const dateFormatter =
      new Intl.DateTimeFormat("en-CA", {
        year: "numeric",
        month: "short",
        day: "numeric",
      });

    function parseCsv(text) {
      const records = [];

      for (const rawLine of text.split(/\r?\n/)) {
        const line = rawLine.trim();

        if (!line) {
          continue;
        }

        const commaIndex = line.indexOf(",");

        if (commaIndex === -1) {
          continue;
        }

        const dateText =
          line.slice(0, commaIndex).trim();

        const priceText =
          line.slice(commaIndex + 1).trim();

        const timestamp =
          Date.parse(`${dateText}T00:00:00`);

        const price =
          Number(priceText.replace(/,/g, ""));

        if (
          !Number.isFinite(timestamp) ||
          !Number.isFinite(price)
        ) {
          continue;
        }

        records.push({
          date: dateText,
          timestamp,
          price,
        });
      }

      records.sort(
        (left, right) =>
          left.timestamp - right.timestamp
      );

      return records;
    }

    function getRangeStart(range, lastDate) {
      const start = new Date(lastDate);

      if (range === "1m") {
        start.setMonth(start.getMonth() - 1);
      } else if (range === "6m") {
        start.setMonth(start.getMonth() - 6);
      } else if (range === "1y") {
        start.setFullYear(start.getFullYear() - 1);
      } else if (range === "5y") {
        start.setFullYear(start.getFullYear() - 5);
      } else {
        return null;
      }

      return start.getTime();
    }

    function filterRecords(range) {
      if (
        range === "all" ||
        allRecords.length === 0
      ) {
        return allRecords;
      }

      const finalTimestamp =
        allRecords[allRecords.length - 1].timestamp;

      const startTimestamp =
        getRangeStart(range, finalTimestamp);

      return allRecords.filter(
        record =>
          record.timestamp >= startTimestamp
      );
    }

    function formatPrice(value) {
      return currencyFormatter.format(value);
    }

    function updateSummary(records) {
      const prices =
        records.map(record => record.price);

      const current =
        prices[prices.length - 1];

      const minimum =
        Math.min(...prices);

      const maximum =
        Math.max(...prices);

      const average =
        prices.reduce(
          (total, value) => total + value,
          0
        ) / prices.length;

      document.getElementById(
        "current-price"
      ).textContent = formatPrice(current);

      document.getElementById(
        "minimum-price"
      ).textContent = formatPrice(minimum);

      document.getElementById(
        "maximum-price"
      ).textContent = formatPrice(maximum);

      document.getElementById(
        "average-price"
      ).textContent = formatPrice(average);

      const firstDate =
        new Date(records[0].timestamp);

      const lastDate =
        new Date(
          records[records.length - 1].timestamp
        );

      rangeSummaryElement.textContent =
        `${dateFormatter.format(firstDate)} – ` +
        `${dateFormatter.format(lastDate)} · ` +
        `${records.length.toLocaleString()} daily records`;
    }

    function buildChart(records) {
      const points = records.map(record => ({
        x: record.timestamp,
        y: record.price,
        date: record.date,
      }));
      const firstTimestamp = records[0].timestamp;

      const lastTimestamp =
        records[records.length - 1].timestamp;

      const context =
        document
          .getElementById("gold-chart")
          .getContext("2d");

      if (chart) {
        chart.destroy();
      }

      chart = new Chart(context, {
        type: "line",

        data: {
          datasets: [
            {
              label: "22K gold rate per gram",
              data: points,
              parsing: false,
              borderColor: "#d4a017",
              backgroundColor:
                "rgba(212, 160, 23, 0.15)",
              borderWidth: 2,
              pointRadius: 0,
              pointHoverRadius: 5,
              pointHoverBackgroundColor: "#e65100",
              pointHoverBorderColor: "#ffffff",
              pointHoverBorderWidth: 2,
              fill: true,
              tension: 0.08,
            },
          ],
        },

        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          normalized: true,
          interaction: {
            mode: "nearest",
            intersect: false,
          },

          plugins: {
            legend: {
              display: false,
            },

            decimation: {
              enabled: true,
              algorithm: "lttb",
              samples: 1000,
            },

            tooltip: {
              callbacks: {
                title(items) {
                  if (!items.length) {
                    return "";
                  }

                  return dateFormatter.format(
                    new Date(items[0].parsed.x)
                  );
                },

                label(context) {
                  return (
                    "22K per gram: " +
                    formatPrice(context.parsed.y)
                  );
                },
              },
            },
          },

          scales: {
            x: {
              type: "linear",
              min: firstTimestamp,
              max: lastTimestamp,
              bounds: "data",
              offset: false,

              grid: {
                display: false,
              },

              ticks: {
                maxTicksLimit: 8,

                callback(value) {
                  return new Intl.DateTimeFormat(
                    "en-CA",
                    {
                      year: "numeric",
                      month: "short",
                    }
                  ).format(new Date(value));
                },
              },
            },

            y: {
              grid: {
                color: "#eeeeee",
              },

              ticks: {
                callback(value) {
                  return formatPrice(value);
                },
              },

              title: {
                display: true,
                text: "INR per gram",
              },
            },
          },
        },
      });
    }

    function selectRange(range) {
      const records = filterRecords(range);

      if (!records.length) {
        showError(
          "No records are available for this range."
        );
        return;
      }

      rangeButtons.forEach(button => {
        button.classList.toggle(
          "active",
          button.dataset.range === range
        );
      });

      buildChart(records);
      updateSummary(records);
    }

    function showError(message) {
      loadingElement.classList.remove("visible");
      chartWrapper.hidden = true;
      summaryElement.hidden = true;

      errorElement.textContent = message;
      errorElement.classList.add("visible");
    }

    async function loadData() {
      try {
        const response = await fetch(
          CSV_PATH,
          {
            cache: "no-store",
          }
        );

        if (!response.ok) {
          throw new Error(
            `HTTP ${response.status}`
          );
        }

        const csvText = await response.text();

        allRecords = parseCsv(csvText);

        if (!allRecords.length) {
          throw new Error(
            "The CSV did not contain valid records."
          );
        }

        loadingElement.classList.remove("visible");
        errorElement.classList.remove("visible");

        chartWrapper.hidden = false;
        summaryElement.hidden = false;

        selectRange("all");

      } catch (error) {
        console.error(error);

        showError(
          "The interactive chart could not load. " +
          "The static SVG chart remains available below."
        );
      }
    }

    rangeButtons.forEach(button => {
      button.addEventListener("click", () => {
        selectRange(button.dataset.range);
      });
    });

    loadData();
  </script>
</body>
</html>
